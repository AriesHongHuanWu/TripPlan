<!DOCTYPE html>
<html lang="zh-Hant" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#2563eb" media="(prefers-color-scheme: light)" />
<meta name="theme-color" content="#0a0c12" media="(prefers-color-scheme: dark)" />
<meta name="description" content="九州・本州・四國 8 日 JR 自由行完整規劃 — 即時天氣、路線導航、伴手禮指南與 Gemini AI 旅伴。" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="九州遊" />
<title>九州 · 本州 · 四國 — JR 自由行規劃</title>

<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" href="assets/icons/favicon.svg" type="image/svg+xml" />
<link rel="apple-touch-icon" href="assets/icons/favicon.svg" />

<link rel="preconnect" href="https://api.open-meteo.com" />
<link rel="preconnect" href="https://unpkg.com" crossorigin />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+TC:wght@400;500;700&display=swap" />

<!-- Leaflet (map) from CDN — no API key needed -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

<link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
<div class="aurora" aria-hidden="true"></div>

<!-- ===== SVG icon sprite ===== -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <symbol id="i-today" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></symbol>
    <symbol id="i-plan" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="17" rx="2"/><path d="M3 9h18M8 2v4M16 2v4M8 14h.01M12 14h.01M16 14h.01"/></symbol>
    <symbol id="i-route" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="3" width="14" height="13" rx="3"/><path d="M5 9h14M9 16l-2 4M15 16l2 4M9 12.5h.01M15 12.5h.01"/></symbol>
    <symbol id="i-weather" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="9" r="3.2"/><path d="M8 2v1.5M8 14.5V16M2 9h1.5M12.5 9H14M4 5l1 1M11 5l-1 1"/><path d="M17.5 13a4 4 0 0 1 .5 7.9H8a3.5 3.5 0 0 1-.5-6.97"/></symbol>
    <symbol id="i-gift" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="9" width="18" height="12" rx="1"/><path d="M3 13h18M12 9v12"/><path d="M12 9C9 9 7 8 7 6a2 2 0 0 1 5-1c2 0 3 2 0 4ZM12 9c3 0 5-1 5-3a2 2 0 0 0-5-1"/></symbol>
    <symbol id="i-ai" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.5l1.9 5.1a4 4 0 0 0 2.4 2.4l5.2 2-5.2 1.9a4 4 0 0 0-2.4 2.4L12 21.5l-1.9-5.2a4 4 0 0 0-2.4-2.4L2.5 12l5.2-1.9a4 4 0 0 0 2.4-2.4Z"/><circle cx="19" cy="4.5" r="1.6"/></symbol>
    <symbol id="i-pin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s7-5.5 7-11a7 7 0 1 0-14 0c0 5.5 7 11 7 11Z"/><circle cx="12" cy="10" r="2.5"/></symbol>
    <symbol id="i-gear" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.6 1.6 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.6 1.6 0 0 0-2.7 1.1V21a2 2 0 0 1-4 0v-.1A1.6 1.6 0 0 0 7 19.4a1.6 1.6 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.6 1.6 0 0 0-1.1-2.7H3a2 2 0 0 1 0-4h.1A1.6 1.6 0 0 0 4.6 7a1.6 1.6 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.6 1.6 0 0 0 1.8.3H9a1.6 1.6 0 0 0 1-1.5V1a2 2 0 0 1 4 0v.1a1.6 1.6 0 0 0 2.7 1.1l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.6 1.6 0 0 0-.3 1.8V9a1.6 1.6 0 0 0 1.5 1H23a2 2 0 0 1 0 4h-.1a1.6 1.6 0 0 0-1.5 1Z"/></symbol>
    <symbol id="i-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4.5"/><path d="M12 1.5V4M12 20v2.5M4.2 4.2l1.8 1.8M18 18l1.8 1.8M1.5 12H4M20 12h2.5M4.2 19.8 6 18M18 6l1.8-1.8"/></symbol>
    <symbol id="i-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/></symbol>
    <symbol id="i-send" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 11 13M22 2l-7 20-4-9-9-4Z"/></symbol>
    <symbol id="i-mic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 11a7 7 0 0 0 14 0M12 18v4"/></symbol>
    <symbol id="i-ext" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6M21 3l-9 9M19 14v5a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h5"/></symbol>
    <symbol id="i-train" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="3" width="16" height="14" rx="3"/><path d="M4 11h16M8 17l-2 4M16 17l2 4M8.5 7h7"/><circle cx="8" cy="14" r=".6"/><circle cx="16" cy="14" r=".6"/></symbol>
    <symbol id="i-walk" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="13" cy="4" r="2"/><path d="M9 21l2-5 2-3-1-4 3 3 3 1M11 13l-2-3-3 2"/></symbol>
    <symbol id="i-bus" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="3" width="16" height="14" rx="3"/><path d="M4 11h16M7 17v3M17 17v3"/><circle cx="8" cy="14" r=".6"/><circle cx="16" cy="14" r=".6"/></symbol>
    <symbol id="i-yen" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 4l5 7 5-7M12 11v9M8 14h8M8 17h8"/></symbol>
    <symbol id="i-ticket" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2 2 2 0 0 0 0 4 2 2 0 0 1 0 4 2 2 0 0 1-2 2H5a2 2 0 0 1-2-2 2 2 0 0 0 0-4 2 2 0 0 1 0-4Z"/><path d="M14 6v12" stroke-dasharray="2 3"/></symbol>
    <symbol id="i-close" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 6l12 12M18 6 6 18"/></symbol>
    <symbol id="i-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></symbol>
    <symbol id="i-info" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 11v5M12 8h.01"/></symbol>
    <symbol id="i-loc" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></symbol>
    <symbol id="i-drop" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3s6 6.5 6 11a6 6 0 0 1-12 0c0-4.5 6-11 6-11Z"/></symbol>
    <symbol id="i-wind" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8h11a2.5 2.5 0 1 0-2.5-2.5M3 16h15a2.5 2.5 0 1 1-2.5 2.5"/></symbol>
    <symbol id="i-bag" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8h12l-1 12a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2Z"/><path d="M9 8V6a3 3 0 0 1 6 0v2"/></symbol>
  </defs>
</svg>

<div id="app">
  <!-- ===== App bar ===== -->
  <header class="appbar">
    <div class="appbar__brand">
      <div class="appbar__logo"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s7-5.5 7-11a7 7 0 1 0-14 0c0 5.5 7 11 7 11Z"/><circle cx="12" cy="10" r="2.4" fill="#fff" stroke="none"/></svg></div>
      <div class="stack" style="min-width:0">
        <span class="appbar__title" id="appbarTitle">九州 · 本州 · 四國</span>
        <span class="appbar__sub" id="appbarSub">JR 自由行 · 6/17–6/24</span>
      </div>
    </div>
    <div class="appbar__spacer"></div>
    <button class="iconbtn iconbtn--live" id="locBtn" title="定位"><svg><use href="#i-loc"/></svg></button>
    <button class="iconbtn" id="themeBtn" title="深色 / 淺色"><svg><use href="#i-moon"/></svg></button>
    <button class="iconbtn" id="settingsBtn" title="設定"><svg><use href="#i-gear"/></svg></button>
  </header>

  <main>
    <!-- ===== 1. TODAY ===== -->
    <section class="page" id="page-today" data-page="today">
      <div id="todayRoot"></div>
    </section>

    <!-- ===== 2. ITINERARY ===== -->
    <section class="page" id="page-plan" data-page="plan" hidden>
      <div class="section-head" style="margin-top:4px">
        <h1 class="h-display">行程規劃</h1>
        <span class="chip chip--brand" id="planCountChip">8 天</span>
      </div>
      <div class="daypick" id="dayPick"></div>
      <div id="dayDetail"></div>
    </section>

    <!-- ===== 3. ROUTES & MAP ===== -->
    <section class="page" id="page-route" data-page="route" hidden>
      <div class="section-head" style="margin-top:4px">
        <h1 class="h-display">路線・地圖</h1>
      </div>
      <div class="chiprow" id="routeSeg" style="margin-bottom:14px">
        <button class="chip chip--tap is-on" data-seg="map">全圖</button>
        <button class="chip chip--tap" data-seg="lines">JR 路線圖</button>
        <button class="chip chip--tap" data-seg="trips">所有班次</button>
        <button class="chip chip--tap" data-seg="pass">車票方案</button>
      </div>
      <div id="routeMapWrap" class="route-seg">
        <div id="leafmap"></div>
        <div class="map-legend" id="mapLegend"></div>
        <p class="tiny muted-3" style="margin-top:10px">點地圖上的標記查看景點、天氣與 Google Maps 導航。涵蓋本州（廣島・下關）、九州（福岡・熊本）與四國。</p>
      </div>
      <div id="routeLinesWrap" class="route-seg" hidden></div>
      <div id="routeTripsWrap" class="route-seg" hidden></div>
      <div id="routePassWrap" class="route-seg" hidden></div>
    </section>

    <!-- ===== 4. WEATHER ===== -->
    <section class="page" id="page-weather" data-page="weather" hidden>
      <div class="section-head" style="margin-top:4px">
        <h1 class="h-display">即時天氣</h1>
        <span class="chip chip--sakura">梅雨季</span>
      </div>
      <div class="chiprow" id="wxCityPick" style="margin-bottom:14px"></div>
      <div id="wxRoot"></div>
    </section>

    <!-- ===== 5. SOUVENIRS ===== -->
    <section class="page" id="page-gift" data-page="gift" hidden>
      <div class="section-head" style="margin-top:4px">
        <h1 class="h-display">伴手禮指南</h1>
      </div>
      <div class="chiprow" id="giftCityPick" style="margin-bottom:14px"></div>
      <div id="giftRoot" class="stagger"></div>
    </section>

    <!-- ===== 6. AI ===== -->
    <section class="page" id="page-ai" data-page="ai" hidden>
      <div class="chat-wrap">
        <div class="row-between" style="padding:4px 2px 8px">
          <div class="row">
            <div class="appbar__logo" style="width:30px;height:30px;border-radius:9px"><svg viewBox="0 0 24 24" fill="#fff"><use href="#i-ai"/></svg></div>
            <div class="stack">
              <b style="font-size:15px">Gemini 旅伴</b>
              <span class="tiny muted-3" id="aiModelLabel">Flash 3.0</span>
            </div>
          </div>
          <div class="agent-toggle">
            <span class="tiny muted">代理模式</span>
            <button class="switch" id="agentSwitch" role="switch" aria-checked="false" title="代理模式：讓 AI 操控頁面"></button>
          </div>
        </div>
        <div class="chat-scroll" id="chatScroll"></div>
        <div class="suggest" id="chatSuggest"></div>
        <div class="composer">
          <button class="mic-btn" id="micBtn" title="語音輸入"><svg><use href="#i-mic"/></svg></button>
          <div class="composer__field">
            <textarea id="chatInput" rows="1" placeholder="問我任何事 — 例如「明天怎麼去廣島？」"></textarea>
            <button class="send-btn" id="sendBtn" title="送出"><svg><use href="#i-send"/></svg></button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- ===== Bottom tab bar ===== -->
  <nav class="tabbar" id="tabbar">
    <button class="tab is-active" data-tab="today"><span class="tab__icon"><svg><use href="#i-today"/></svg></span>今日</button>
    <button class="tab" data-tab="plan"><span class="tab__icon"><svg><use href="#i-plan"/></svg></span>行程</button>
    <button class="tab" data-tab="route"><span class="tab__icon"><svg><use href="#i-route"/></svg></span>路線</button>
    <button class="tab" data-tab="weather"><span class="tab__icon"><svg><use href="#i-weather"/></svg></span>天氣</button>
    <button class="tab" data-tab="gift"><span class="tab__icon"><svg><use href="#i-gift"/></svg></span>伴手禮</button>
    <button class="tab" data-tab="ai"><span class="tab__icon"><svg><use href="#i-ai"/></svg></span>AI</button>
  </nav>
</div>

<!-- ===== Detail sheet ===== -->
<div class="scrim" id="scrim"></div>
<div class="sheet" id="sheet" role="dialog" aria-modal="true">
  <div class="sheet__grab"></div>
  <div class="sheet__head">
    <span class="sheet__title" id="sheetTitle">詳情</span>
    <button class="iconbtn" id="sheetClose"><svg><use href="#i-close"/></svg></button>
  </div>
  <div class="sheet__body" id="sheetBody"></div>
</div>

<!-- ===== Settings sheet ===== -->
<div class="sheet" id="settingsSheet" role="dialog" aria-modal="true">
  <div class="sheet__grab"></div>
  <div class="sheet__head">
    <span class="sheet__title">設定</span>
    <button class="iconbtn" id="settingsClose"><svg><use href="#i-close"/></svg></button>
  </div>
  <div class="sheet__body" id="settingsBody"></div>
</div>

<div class="toast" id="toast"></div>

<!-- Leaflet JS from CDN -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

<!-- App (ES modules) -->
<script type="module" src="assets/js/main.js"></script>
</body>
</html>
